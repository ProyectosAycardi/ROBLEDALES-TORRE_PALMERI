<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al proyecto</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body class="login">

<header class="header">

  <!-- Títulos -->
  <div class="header-center">
    <h1 id="tituloProyecto"></h1>
  </div>

  <!-- Logo -->
  <div class="header-right">
    <img src="assets/img/LogoB.png" class="logo">
  </div>

</header>

<main class="login-container">

  <!-- IZQUIERDA: imagen -->
  <div class="login-image">
    <img src="assets/img/MODELO 3D.png" alt="Modelo 3D">
  </div>

  <!-- DERECHA: contenido -->
  <div class="login-content">

    <div class="login-card">
        <img src="assets/img/LogoCliente.png" class="logo-cliente">

      <h2>Inicio de sesión</h2>

      <div class="input-group">
          <span class="material-symbols-outlined input-icon">
              person
          </span>

          <input type="text"
                id="usuario"
                placeholder="Usuario">
      </div>

      <div class="input-group">

          <span class="material-symbols-outlined input-icon">
              lock
          </span>

          <input type="password"
                id="password"
                placeholder="Contraseña">
      </div>

      <button onclick="login()">Ingresar</button>

      <p id="loginError" class="error"></p>
    </div>

  </div>

</main>


<script src="js/login.js"></script>

</body>
</html>
